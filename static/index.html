<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HighPerfServer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
        .container { max-width: 600px; padding: 2rem; }
        h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #38bdf8; }
        p { color: #94a3b8; margin-bottom: 1.5rem; line-height: 1.6; }
        .api-list { list-style: none; }
        .api-list li { background: #1e293b; padding: 0.75rem 1rem; margin-bottom: 0.5rem; border-radius: 8px; font-family: monospace; font-size: 0.9rem; }
        .method { color: #4ade80; font-weight: bold; }
        .path { color: #38bdf8; }
        #result { margin-top: 1.5rem; background: #1e293b; padding: 1rem; border-radius: 8px; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; min-height: 2rem; }
        button { background: #2563eb; color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.9rem; margin-right: 0.5rem; margin-top: 1rem; }
        button:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>HighPerfServer</h1>
        <p>C++ epoll-based HTTP server is running.</p>
        <ul class="api-list">
            <li><span class="method">GET</span>  <span class="path">/api/hello</span></li>
            <li><span class="method">GET</span>  <span class="path">/api/status</span></li>
            <li><span class="method">POST</span> <span class="path">/api/echo</span></li>
        </ul>
        <div>
            <button onclick="testApi('/api/hello')">Test /api/hello</button>
            <button onclick="testApi('/api/status')">Test /api/status</button>
            <button onclick="testEcho()">Test /api/echo</button>
        </div>
        <div id="result">Click a button to test the API</div>
    </div>
    <script>
        async function testApi(path) {
            const el = document.getElementById('result');
            el.textContent = 'Loading...';
            try {
                const res = await fetch(path);
                const data = await res.json();
                el.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                el.textContent = 'Error: ' + e.message;
            }
        }
        async function testEcho() {
            const el = document.getElementById('result');
            const msg = prompt('Enter a message to echo:', 'Hello from browser!');
            if (msg === null) return;
            el.textContent = 'Loading...';
            try {
                const res = await fetch('/api/echo', { method: 'POST', body: msg });
                const data = await res.json();
                el.textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                el.textContent = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
